name: Landing PAGE

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Construir imagen de docker
      run: docker build -t ghcr.io/jorgeminda/landing:1.0.0 .
    
    # 🛠️ CORREGIDO AQUÍ: Se cambió a github.token para que use la clave nativa de Actions con el permiso de escritura.
    - name: Login en GitHub Container Registry
      run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    
    # Ahora que el login será exitoso con los permisos correctos, este paso pasará sin error:
    - name: Publicar la imagen creada
      run: docker push ghcr.io/jorgeminda/landing:1.0.0 

    - name: 🧾 Mostrar variables básicas (solo locales, no secretos)
      run: |
        echo "Probando conexión SSH con:"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "Usuario: ${{ secrets.VPS_USER }}"
        echo "Puerto: ${{ secrets.VPS_SSH_PORT }}"
    
    - name: 🧪 Probar conexión SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        script: |
          echo "✅ Conexión exitosa desde GitHub Actions"
          hostname
          whoami
          uptime